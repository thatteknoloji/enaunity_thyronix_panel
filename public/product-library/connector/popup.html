<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ENA Marketplace Connector</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f8fafc;
      --card: #ffffff;
      --line: #dbe4ee;
      --text: #0f172a;
      --muted: #475569;
      --brand: #0f766e;
      --brand-2: #14b8a6;
      --danger: #be123c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      width: 380px;
      background: linear-gradient(180deg, #effcf9 0%, var(--bg) 100%);
      color: var(--text);
      font: 13px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }
    .wrap { padding: 16px; }
    .hero {
      background: linear-gradient(135deg, #0f766e, #14b8a6);
      color: white;
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 18px 40px rgba(15, 118, 110, 0.22);
    }
    h1 { margin: 0; font-size: 18px; }
    .sub { margin-top: 6px; opacity: 0.9; font-size: 12px; }
    .card {
      margin-top: 12px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
    }
    .label { display: block; margin-bottom: 6px; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
    select, button {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--line);
      font: inherit;
    }
    select {
      padding: 10px 12px;
      background: #fff;
      color: var(--text);
    }
    button {
      padding: 10px 12px;
      background: #fff;
      color: var(--text);
      cursor: pointer;
      transition: transform .12s ease, background .12s ease;
    }
    button.primary {
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      border-color: transparent;
      color: white;
      font-weight: 700;
    }
    button:hover { transform: translateY(-1px); }
    .grid { display: grid; gap: 10px; }
    .grid.two { grid-template-columns: 1fr 1fr; }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .muted { color: var(--muted); }
    .tiny { font-size: 11px; }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      border: 1px solid var(--line);
      background: #fff;
    }
    .status.ok { color: #166534; background: #ecfdf5; border-color: #bbf7d0; }
    .status.warn { color: #92400e; background: #fffbeb; border-color: #fde68a; }
    .status.err { color: var(--danger); background: #fff1f2; border-color: #fecdd3; }
    .toggle {
      width: 44px;
      height: 26px;
      border-radius: 999px;
      background: #cbd5e1;
      position: relative;
      cursor: pointer;
      border: none;
    }
    .toggle::after {
      content: "";
      position: absolute;
      top: 3px;
      left: 3px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: white;
      transition: transform .12s ease;
    }
    .toggle.on { background: linear-gradient(135deg, var(--brand), var(--brand-2)); }
    .toggle.on::after { transform: translateX(18px); }
    .logs { max-height: 180px; overflow: auto; }
    .log {
      padding: 9px 0;
      border-bottom: 1px solid #eef2f7;
    }
    .log:last-child { border-bottom: 0; }
    .danger { color: var(--danger); }
    a.link { color: var(--brand); text-decoration: none; font-weight: 700; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>ENA Marketplace Connector</h1>
      <div class="sub">Product Library kuyrugunu acik pazaryeri oturumunda calistirir.</div>
    </div>

    <div class="card">
      <div class="row">
        <div>
          <div class="label" style="margin-bottom:4px">Oturum</div>
          <div id="sessionStatus" class="status warn">Kontrol ediliyor</div>
        </div>
        <button id="refreshBtn">Yenile</button>
      </div>
      <div id="sessionMeta" class="tiny muted" style="margin-top:10px"></div>
    </div>

    <div class="card">
      <label class="label" for="connectionSelect">Calisacak Magaza</label>
      <select id="connectionSelect">
        <option value="">Baglanti sec</option>
      </select>
      <div class="row" style="margin-top:12px">
        <div>
          <div class="label" style="margin-bottom:4px">Otomatik Calis</div>
          <div class="tiny muted">Her dakika kuyrugu kontrol etsin</div>
        </div>
        <button id="autoRunToggle" class="toggle" aria-label="Otomatik calis"></button>
      </div>
      <div id="connectionMeta" class="tiny muted" style="margin-top:10px"></div>
    </div>

    <div class="card grid">
      <button id="runNowBtn" class="primary">Simdi Calistir</button>
      <div class="grid two">
        <button id="openMarketBtn">Pazaryeri Sekmesini Ac</button>
        <button id="openDashboardBtn">ENA Paneli Ac</button>
      </div>
      <div id="lastRunMeta" class="tiny muted"></div>
    </div>

    <div class="card">
      <div class="row" style="margin-bottom:8px">
        <div class="label" style="margin:0">Son Loglar</div>
        <span id="logHint" class="tiny muted"></span>
      </div>
      <div id="logs" class="logs tiny muted">Henuz log yok.</div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
